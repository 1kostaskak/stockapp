<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Βοηθός Stocks">
<meta name="theme-color" content="#0d1b2a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Βοηθός Stocks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f0efe9;--border:#e8e7e0;
  --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;
  --green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;
  --yellow:#d97706;--yellow-bg:#fffbeb;--blue:#2563eb;--blue-bg:#eff6ff;
  --accent:#0d1b2a;--radius:12px;--radius-sm:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding-bottom:80px;}

/* Header */
.header{background:var(--accent);color:white;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:34px;height:34px;background:#4ade80;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header h1{font-size:15px;font-weight:600;line-height:1.2;}
.header-sub{font-size:11px;opacity:.55;font-family:'DM Mono',monospace;}
.refresh-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:white;padding:7px 12px;font-size:20px;cursor:pointer;line-height:1;}
.refresh-btn:disabled{opacity:.4;}

/* Tabs */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 8px;position:sticky;top:62px;z-index:99;overflow-x:auto;}
.tab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* Content */
.content{padding:14px;}
.section{margin-bottom:18px;}
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin-bottom:8px;padding-left:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}

/* Stock Row */
.stock-row{padding:11px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:40px 1fr auto auto;gap:10px;align-items:center;}
.stock-row:last-child{border-bottom:none;}
.stock-icon{width:36px;height:36px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text2);font-family:'DM Mono',monospace;}
.stock-main{}
.stock-ticker{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.3px;}
.stock-name{font-size:11px;color:var(--text3);margin-top:1px;}
.entry-sig{font-size:10px;color:var(--blue);margin-top:2px;}

/* Badges row */
.badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:5px;font-family:'DM Mono',monospace;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
.badge-gray{background:var(--surface2);color:var(--text2);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}

/* Signal */
.stock-signal{text-align:center;}
.signal-icon{font-size:18px;line-height:1;}
.signal-label{font-size:9px;color:var(--text3);margin-top:2px;text-align:center;}

/* Price */
.stock-price{text-align:right;}
.price-val{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px;}
.price-chg{font-size:11px;font-weight:500;margin-top:2px;font-family:'DM Mono',monospace;}
.price-dist{font-size:10px;margin-top:1px;color:var(--text3);}
.up{color:var(--green);}.down{color:var(--red);}.flat{color:var(--text3);}

/* MA dots */
.ma-row{display:flex;gap:3px;align-items:center;margin-top:3px;}
.ma-dot{width:7px;height:7px;border-radius:50%;}
.ma-dot.above{background:var(--green);}.ma-dot.below{background:var(--red);}
.ma-label{font-size:9px;color:var(--text3);}

/* Futures */
.futures-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fut-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;}
.fut-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.fut-price{font-size:19px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px;}
.fut-chg{font-size:12px;font-weight:500;margin-top:3px;}

/* Watchlist add */
.add-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;gap:8px;margin-bottom:14px;}
.add-input{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:14px;font-family:'DM Mono',monospace;text-transform:uppercase;background:var(--surface2);color:var(--text);outline:none;}
.add-input:focus{border-color:var(--accent);}
.add-btn{background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:8px 15px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.add-btn:disabled{opacity:.4;}
.remove-btn{width:26px;height:26px;border-radius:50%;border:none;background:var(--surface2);color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Loading / empty */
.loading{padding:40px;text-align:center;color:var(--text3);font-size:14px;}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:14px;}
.empty-icon{font-size:36px;margin-bottom:8px;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;max-width:480px;margin:0 auto;padding:4px 0 env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:8px;border:none;background:none;font-size:10px;font-weight:500;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Sans',sans-serif;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:22px;}

/* Toast */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--accent);color:white;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback}=React;

const BIG7=[
  {ticker:'AAPL',name:'Apple',target:236},
  {ticker:'MSFT',name:'Microsoft',target:497},
  {ticker:'GOOGL',name:'Alphabet',target:207},
  {ticker:'AMZN',name:'Amazon',target:245},
  {ticker:'META',name:'Meta',target:675},
  {ticker:'NVDA',name:'NVIDIA',target:163},
  {ticker:'TSLA',name:'Tesla',target:320},
];

const FUTURES=[
  {ticker:'ES=F',label:'S&P 500',section:'index'},
  {ticker:'NQ=F',label:'Nasdaq 100',section:'index'},
  {ticker:'YM=F',label:'Dow Jones',section:'index'},
  {ticker:'GC=F',label:'Χρυσός',section:'commodity'},
  {ticker:'SI=F',label:'Silver (Αργ.)',section:'commodity'},
  {ticker:'CL=F',label:'WTI Πετρέλαιο',section:'commodity'},
  {ticker:'BZ=F',label:'Brent',section:'commodity'},
];

async function fetchQuote(ticker){
  try{
    const r=await fetch(`/api/quote?ticker=${ticker}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const json=await r.json();
    
    // Finnhub = real-time price+%, Yahoo = historical for RSI/MA
    const q=json.quote;
    const yahooResult=json.hist?.chart?.result?.[0];
    console.log('API response:', JSON.stringify(json).slice(0,200));
    if(!q||q.c==null||q.c===0) throw new Error('No data - q='+JSON.stringify(q));
    
    const price=q.c;
    const chg=q.dp??0;
    const rawCloses=yahooResult?.indicators?.quote?.[0]?.close??[];
    const closes=rawCloses.filter(v=>v!=null);
    
    // RSI-14
    let rsi=null;
    if(closes.length>=15){
      const sl=closes.slice(-15);
      const dl=sl.slice(1).map((c,i)=>c-sl[i]);
      const ag=dl.map(d=>d>0?d:0).reduce((a,b)=>a+b,0)/14;
      const al=dl.map(d=>d<0?-d:0).reduce((a,b)=>a+b,0)/14;
      rsi=al===0?100:Math.round(100-100/(1+ag/al));
    }
    const ma50=closes.length>=50?closes.slice(-50).reduce((a,b)=>a+b,0)/50:null;
    const ma200=closes.length>=200?closes.slice(-200).reduce((a,b)=>a+b,0)/200:null;
    
    // Consecutive oversold days
    let odays=0;
    for(let i=closes.length-1;i>=Math.max(14,closes.length-10);i--){
      const sl2=closes.slice(i-14,i+1);
      const dl2=sl2.slice(1).map((c,j)=>c-sl2[j]);
      const ag2=dl2.map(d=>d>0?d:0).reduce((a,b)=>a+b,0)/14;
      const al2=dl2.map(d=>d<0?-d:0).reduce((a,b)=>a+b,0)/14;
      const r2=al2===0?100:100-100/(1+ag2/al2);
      if(r2<45) odays++; else break;
    }
    const entry=odays>=3&&chg>0&&rsi&&rsi<45?`🎯 Είσοδος ~$${(price*.995).toFixed(2)} (${odays} μέρες oversold)`:null;
    return{price,chg,rsi,ma50,ma200,ma50above:ma50?price>ma50:null,ma200above:ma200?price>ma200:null,entry,ok:true};
  }catch(e){return{ok:false,error:e.message};}
}

function getSignal(d){
  if(!d?.ok) return{icon:'',label:'',cls:''};
  const{rsi,ma50above:a50,ma200above:a200}=d;
  if(rsi>70) return{icon:'🔴',label:'OVERBOUGHT',cls:'badge-red'};
  if(rsi<35&&a200) return{icon:'🟢',label:'BUY ZONE',cls:'badge-green'};
  if(a50&&a200) return{icon:'🟢',label:'BULLISH',cls:'badge-green'};
  if(a50===false&&a200===false) return{icon:'🔴',label:'BEARISH',cls:'badge-red'};
  return{icon:'🟡',label:'NEUTRAL',cls:'badge-yellow'};
}

function getRsiCls(rsi){
  if(!rsi) return 'badge-gray';
  if(rsi>70) return 'badge-red';
  if(rsi<35) return 'badge-green';
  return 'badge-gray';
}

const h=React.createElement;

function StockRow({ticker,name,target,data,onRemove}){
  if(!data) return h('div',{className:'stock-row'},
    h('div',{className:'stock-icon'},ticker.slice(0,3)),
    h('div',{className:'stock-main'},h('div',{className:'stock-ticker'},ticker),h('div',{className:'stock-name'},name||ticker)),
    h('div',null),
    h('div',{className:'spinner',style:{width:16,height:16,margin:0}})
  );
  if(!data.ok) return h('div',{className:'stock-row'},
    h('div',{className:'stock-icon'},'!'),
    h('div',{className:'stock-main'},h('div',{className:'stock-ticker'},ticker),h('div',{className:'stock-name',style:{color:'var(--red)'}},'Σφάλμα')),
    h('div',null),h('div',null)
  );
  const cc=data.chg>0?'up':data.chg<0?'down':'flat';
  const pfx=data.chg>0?'+':'';
  const sig=getSignal(data);
  const dist=target?((target-data.price)/data.price*100):null;
  const distCls=dist>0?'up':'down';
  return h('div',{className:'stock-row'},
    h('div',{className:'stock-icon'},ticker.slice(0,3)),
    h('div',{className:'stock-main'},
      h('div',{className:'stock-ticker'},ticker),
      h('div',{className:'stock-name'},name||ticker),
      h('div',{className:'badges'},
        data.rsi&&h('span',{className:`badge ${getRsiCls(data.rsi)}`},'RSI '+data.rsi),
        h('span',{className:`badge ${sig.cls}`},sig.label),
        data.ma50above!==null&&h('span',{className:`badge ${data.ma50above?'badge-green':'badge-red'}`},'MA50 '+(data.ma50above?'✓':'✗')),
        data.ma200above!==null&&h('span',{className:`badge ${data.ma200above?'badge-green':'badge-red'}`},'MA200 '+(data.ma200above?'✓':'✗')),
      ),
      data.entry&&h('div',{className:'entry-sig'},data.entry)
    ),
    h('div',{className:'stock-signal'},
      h('div',{className:'signal-icon'},sig.icon)
    ),
    h('div',{className:'stock-price'},
      h('div',{className:'price-val'},'$'+data.price?.toFixed(2)),
      h('div',{className:`price-chg ${cc}`},pfx+data.chg?.toFixed(2)+'% ημερήσια'),
      target&&h('div',{className:'price-dist'},`🎯 target $${target}`),
      onRemove&&h('button',{className:'remove-btn',onClick:()=>onRemove(ticker),style:{marginTop:4}},'×')
    )
  );
}

function FutCard({item,data}){
  if(!data?.ok) return h('div',{className:'fut-card'},
    h('div',{className:'fut-label'},item.label),
    h('div',{className:'fut-price',style:{color:'var(--text3)'}},'—')
  );
  const cc=data.chg>0?'up':data.chg<0?'down':'flat';
  const pfx=data.chg>0?'+':'';
  return h('div',{className:'fut-card'},
    h('div',{className:'fut-label'},item.label),
    h('div',{className:`fut-price ${cc}`},'$'+data.price?.toFixed(2)),
    h('div',{className:`fut-chg ${cc}`},pfx+data.chg?.toFixed(2)+'% (ετήσια)')
  );
}

function App(){
  const [tab,setTab]=useState('markets');
  const [data,setData]=useState({});
  const [loading,setLoading]=useState(false);
  const [lastUp,setLastUp]=useState(null);
  const [watchlist,setWatchlist]=useState(()=>{try{return JSON.parse(localStorage.getItem('wl3')||'[]')}catch{return[]}});
  const [addVal,setAddVal]=useState('');
  const [adding,setAdding]=useState(false);
  const [toast,setToast]=useState(null);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const loadAll=useCallback(async()=>{
    setLoading(true);
    const tickers=[...new Set([...BIG7.map(s=>s.ticker),...FUTURES.map(f=>f.ticker),...watchlist.map(w=>w.ticker)])];
    const res={};
    await Promise.all(tickers.map(async t=>{res[t]=await fetchQuote(t);}));
    setData(res);
    setLastUp(new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}));
    setLoading(false);
  },[watchlist]);

  useEffect(()=>{loadAll();},[]);
  useEffect(()=>{localStorage.setItem('wl3',JSON.stringify(watchlist));},[watchlist]);

  const handleAdd=async()=>{
    const t=addVal.trim().toUpperCase();
    if(!t) return;
    if(watchlist.find(w=>w.ticker===t)||BIG7.find(b=>b.ticker===t)){showToast('Υπάρχει ήδη');return;}
    setAdding(true);
    const d=await fetchQuote(t);
    if(!d.ok){showToast('Δεν βρέθηκε: '+t);}
    else{setWatchlist(p=>[...p,{ticker:t,name:t}]);setData(p=>({...p,[t]:d}));setAddVal('');showToast('✓ Προστέθηκε: '+t);}
    setAdding(false);
  };

  const idxFut=FUTURES.filter(f=>f.section==='index');
  const comFut=FUTURES.filter(f=>f.section==='commodity');

  return h('div',{className:'app'},
    h('div',{className:'header'},
      h('div',{className:'header-left'},
        h('div',{className:'header-logo'},'📈'),
        h('div',null,
          h('h1',null,'Βοηθός Stocks'),
          lastUp&&h('div',{className:'header-sub'},'Ενημ. '+lastUp+' · 15λ delay')
        )
      ),
      h('button',{className:'refresh-btn',onClick:loadAll,disabled:loading},loading?'⏳':'↻')
    ),

    h('div',{className:'tabs'},
      h('button',{className:`tab ${tab==='markets'?'active':''}`,onClick:()=>setTab('markets')},'📊 Αγορές'),
      h('button',{className:`tab ${tab==='futures'?'active':''}`,onClick:()=>setTab('futures')},'📈 Futures'),
      h('button',{className:`tab ${tab==='watchlist'?'active':''}`,onClick:()=>setTab('watchlist')},'⭐ Watchlist')
    ),

    h('div',{className:'content'},
      tab==='markets'&&h('div',{className:'section'},
        h('div',{className:'section-title'},'Big 7'),
        loading&&!data['AAPL']
          ?h('div',{className:'loading'},h('div',{className:'spinner'}),'Φόρτωση...')
          :h('div',{className:'card'},
            BIG7.map(s=>h(StockRow,{key:s.ticker,ticker:s.ticker,name:s.name,target:s.target,data:data[s.ticker]}))
          )
      ),

      tab==='futures'&&h('div',null,
        h('div',{className:'section'},
          h('div',{className:'section-title'},'Index Futures'),
          h('div',{className:'futures-grid'},idxFut.map(f=>h(FutCard,{key:f.ticker,item:f,data:data[f.ticker]})))
        ),
        h('div',{className:'section'},
          h('div',{className:'section-title'},'Commodities'),
          h('div',{className:'futures-grid'},comFut.map(f=>h(FutCard,{key:f.ticker,item:f,data:data[f.ticker]})))
        )
      ),

      tab==='watchlist'&&h('div',null,
        h('div',{className:'add-box'},
          h('input',{className:'add-input',placeholder:'Ticker (π.χ. PLTR)',value:addVal,
            onChange:e=>setAddVal(e.target.value.toUpperCase()),
            onKeyDown:e=>e.key==='Enter'&&handleAdd(),maxLength:6}),
          h('button',{className:'add-btn',onClick:handleAdd,disabled:adding||!addVal.trim()},adding?'...':'+ Προσθήκη')
        ),
        watchlist.length===0
          ?h('div',{className:'empty'},h('div',{className:'empty-icon'},'📋'),'Πρόσθεσε μετοχές στη watchlist σου')
          :h('div',{className:'card'},
            watchlist.map(s=>h(StockRow,{key:s.ticker,ticker:s.ticker,name:s.name,data:data[s.ticker],
              onRemove:t=>{setWatchlist(p=>p.filter(w=>w.ticker!==t));showToast('Αφαιρέθηκε');}}))
          )
      )
    ),

    toast&&h('div',{className:'toast'},toast),

    h('div',{className:'bottom-nav'},
      [['markets','📊','Αγορές'],['futures','📈','Futures'],['watchlist','⭐','Watchlist']].map(([t,icon,label])=>
        h('button',{key:t,className:`nav-btn ${tab===t?'active':''}`,onClick:()=>setTab(t)},
          h('span',{className:'nav-icon'},icon),label
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
